name: seasound
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - libsndfile         # system dependency for soundfile
  - pip
  - pip:
    - soundfile>=0.12
    - pyarrow>=12.0
    - openpyxl>=3.1
    - pyyaml>=6.0
    - matplotlib>=3.7
    - pytest>=7.0